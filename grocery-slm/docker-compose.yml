# Docker Compose for the GroceryGPT demo.
#
# Services:
#   trainer       (profile: train) - one-shot CPU LoRA fine-tune + GGUF export
#   ollama        - runs ollama daemon, persists models in named volume
#   ollama-init   - registers grocery-slm with the daemon via `ollama create`
#   webui         - nginx serving the chat UI + proxying /api/* to ollama
#
# Typical workflow:
#
#   # 1) build the model (one-shot, ~5-15 min on CPU)
#   docker compose --profile train run --rm trainer
#
#   # 2) start the demo (Ollama + UI)
#   docker compose up -d
#
#   # 3) open http://localhost:8080
#
# CPU-only — no GPU resources are requested anywhere.

name: grocery-slm

services:

  # --------------------------------------------------------------------
  # Trainer: one-shot. Trains LoRA, merges, exports GGUF into ./output/
  # --------------------------------------------------------------------
  trainer:
    profiles: ["train"]
    build:
      context: .
      dockerfile: training/Dockerfile
    image: grocery-slm-trainer:latest
    volumes:
      - ./output:/workspace/output
      - hf-cache:/root/.cache/huggingface   # persist HF model downloads
    environment:
      - HF_HUB_DISABLE_TELEMETRY=1
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-4}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-4}
    # honour CPU-only — explicitly NO `deploy.resources.reservations.devices`

  # --------------------------------------------------------------------
  # Ollama daemon (CPU)
  # --------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: grocery-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./output:/models:ro     # GGUF + Modelfile readable inside container
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      # ollama image has no curl; use the built-in CLI which talks to localhost
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # --------------------------------------------------------------------
  # ollama-init: registers grocery-slm with the running daemon, then exits.
  # Uses the same ollama image so the CLI is available; talks to the
  # daemon over the docker network via OLLAMA_HOST.
  # --------------------------------------------------------------------
  ollama-init:
    image: ollama/ollama:latest
    container_name: grocery-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./output:/models:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ ! -f /models/grocery-slm.gguf ]; then
          echo "ERROR: /models/grocery-slm.gguf not found."
          echo "       Run: docker compose --profile train run --rm trainer"
          exit 1
        fi
        echo "[init] checking if grocery-slm is already registered..."
        if ollama list | awk '{print $$1}' | grep -qx "grocery-slm:latest"; then
          echo "[init] grocery-slm already present, skipping create."
        else
          echo "[init] registering grocery-slm with ollama..."
          cd /models && ollama create grocery-slm -f Modelfile
        fi
        echo "[init] warming model..."
        ollama run grocery-slm "" >/dev/null 2>&1 || true
        echo "[init] done."
    restart: "no"

  # --------------------------------------------------------------------
  # Web UI: nginx serves index.html + proxies /api/* to the ollama daemon
  # --------------------------------------------------------------------
  webui:
    image: nginx:alpine
    container_name: grocery-webui
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "8080:80"
    volumes:
      - ./webui/index.html:/usr/share/nginx/html/index.html:ro
      - ./webui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  ollama-data:
  hf-cache:
