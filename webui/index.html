<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GroceryGPT — fruit & veg, on tap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:        #f6f1e6;
    --paper-2:      #efe7d4;
    --ink:          #1f2a1a;
    --ink-soft:     #4a553f;
    --leaf:         #2f5d3a;
    --leaf-deep:    #1c3f24;
    --tomato:       #c8442a;
    --citrus:       #e9a73a;
    --line:         #2f2a20;
    --bubble-user:  #1c3f24;
    --bubble-bot:   #fffaf0;
    --shadow:       0 1px 0 rgba(31,42,26,0.08), 0 8px 24px -12px rgba(31,42,26,0.18);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(233,167,58,0.15), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(47,93,58,0.12), transparent 60%),
      var(--paper);
    color: var(--ink);
    font-family: "Inter Tight", system-ui, sans-serif;
    font-feature-settings: "ss01", "cv11";
    line-height: 1.55;
    overflow: hidden;
  }
  /* subtle paper grain */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image: radial-gradient(rgba(31,42,26,0.045) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events: none;
    mix-blend-mode: multiply;
    z-index: 0;
  }
  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    max-width: 920px;
    margin: 0 auto;
    padding: 28px 28px 18px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 20px;
  }

  /* ---- header ---- */
  header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    border-bottom: 1.5px solid var(--line);
    padding-bottom: 14px;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .brand h1 {
    font-family: "Fraunces", serif;
    font-weight: 800;
    font-size: clamp(34px, 5vw, 52px);
    letter-spacing: -0.02em;
    line-height: 0.95;
    margin: 0;
    color: var(--leaf-deep);
  }
  .brand h1 em {
    font-style: italic;
    color: var(--tomato);
    font-weight: 400;
  }
  .tagline {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
  }
  .status {
    display: flex; align-items: center; gap: 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--citrus);
    box-shadow: 0 0 0 3px rgba(233,167,58,0.25);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .dot.ok    { background: var(--leaf); box-shadow: 0 0 0 3px rgba(47,93,58,0.25); }
  .dot.err   { background: var(--tomato); box-shadow: 0 0 0 3px rgba(200,68,42,0.25); }
  @keyframes pulse { 50% { opacity: 0.5 } }

  /* ---- chat ---- */
  main {
    overflow-y: auto;
    padding: 10px 4px 30px;
    scroll-behavior: smooth;
  }
  main::-webkit-scrollbar { width: 8px; }
  main::-webkit-scrollbar-thumb { background: rgba(31,42,26,0.18); border-radius: 8px; }

  .empty {
    height: 100%;
    display: grid; place-items: center;
    text-align: center;
  }
  .empty-inner { max-width: 520px; }
  .empty p {
    font-family: "Fraunces", serif;
    font-size: 22px;
    font-style: italic;
    color: var(--ink-soft);
    margin: 0 0 22px;
  }
  .chips {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
  }
  .chip {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 14px;
    font-family: "Inter Tight", sans-serif;
    font-size: 13px;
    cursor: pointer;
    color: var(--ink);
    transition: background .15s ease, color .15s ease, transform .15s ease;
  }
  .chip:hover { background: var(--ink); color: var(--paper); transform: translateY(-1px); }

  .msg {
    display: flex;
    margin: 14px 0;
    animation: rise .35s ease both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%;
    padding: 14px 18px;
    border-radius: 18px;
    box-shadow: var(--shadow);
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user .bubble {
    background: var(--bubble-user);
    color: var(--paper);
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }
  .msg.bot .bubble {
    background: var(--bubble-bot);
    color: var(--ink);
    border: 1px solid rgba(31,42,26,0.08);
    border-bottom-left-radius: 4px;
  }
  .role {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 6px 4px;
    align-self: flex-end;
  }
  .msg.user .role { color: var(--leaf-deep); }

  .typing { display: inline-flex; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-soft);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ---- composer ---- */
  footer {
    border-top: 1.5px solid var(--line);
    padding-top: 14px;
  }
  form {
    display: flex; gap: 10px;
    align-items: flex-end;
    background: rgba(255,250,240,0.6);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 8px 8px 8px 16px;
    box-shadow: var(--shadow);
  }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    min-height: 28px;
    max-height: 140px;
    font: inherit;
    font-size: 16px;
    color: var(--ink);
    padding: 8px 0;
  }
  textarea::placeholder { color: var(--ink-soft); font-style: italic; }
  button.send {
    background: var(--leaf-deep);
    color: var(--paper);
    border: none;
    border-radius: 12px;
    padding: 10px 18px;
    font-family: "Inter Tight", sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform .15s ease, background .15s ease;
  }
  button.send:hover:not(:disabled) { background: var(--ink); transform: translateY(-1px); }
  button.send:disabled { opacity: 0.5; cursor: not-allowed; }

  .meta {
    display: flex; justify-content: space-between;
    margin-top: 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .meta a { color: inherit; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <h1>Grocery<em>GPT</em></h1>
      <span class="tagline">a small language model · trained on produce</span>
    </div>
    <div class="status" id="status">
      <span class="dot" id="dot"></span><span id="status-text">connecting…</span>
    </div>
  </header>

  <main id="chat">
    <div class="empty" id="empty">
      <div class="empty-inner">
        <p>Ask me about picking ripe avocados, storing herbs, what's in season, or what to do with that lonely chayote.</p>
        <div class="chips">
          <button class="chip" data-q="How do I pick a ripe avocado?">ripe avocado?</button>
          <button class="chip" data-q="Should I refrigerate tomatoes?">fridge tomatoes?</button>
          <button class="chip" data-q="What's the best way to store fresh herbs?">storing herbs</button>
          <button class="chip" data-q="How do I tell if a watermelon is sweet?">sweet watermelon</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <form id="composer" autocomplete="off">
      <textarea id="input" placeholder="ask about a fruit or vegetable…" rows="1" required></textarea>
      <button class="send" id="send" type="submit">send →</button>
    </form>
    <div class="meta">
      <span>model: <strong id="model-name">grocery-slm</strong></span>
      <span><a href="/api/tags" target="_blank">ollama tags</a></span>
    </div>
  </footer>

</div>

<script>
const MODEL = "grocery-slm";
const chat = document.getElementById("chat");
const empty = document.getElementById("empty");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const composer = document.getElementById("composer");
const dot = document.getElementById("dot");
const statusText = document.getElementById("status-text");

const history = []; // {role, content}

// auto-grow textarea
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 140) + "px";
});

// submit on Enter (Shift+Enter = newline)
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    composer.requestSubmit();
  }
});

// suggestion chips
document.querySelectorAll(".chip").forEach(b => {
  b.addEventListener("click", () => {
    input.value = b.dataset.q;
    composer.requestSubmit();
  });
});

composer.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  input.style.height = "auto";
  await ask(text);
});

function setStatus(state, text) {
  dot.classList.remove("ok", "err");
  if (state === "ok") dot.classList.add("ok");
  if (state === "err") dot.classList.add("err");
  statusText.textContent = text;
}

function appendMessage(role, text) {
  if (empty) empty.remove();
  const wrap = document.createElement("div");
  wrap.className = `msg ${role}`;
  if (role === "user") {
    wrap.innerHTML = `<div class="bubble"></div><span class="role">you</span>`;
  } else {
    wrap.innerHTML = `<span class="role">grocerygpt</span><div class="bubble"></div>`;
  }
  const bubble = wrap.querySelector(".bubble");
  bubble.textContent = text;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function showTyping(bubble) {
  bubble.innerHTML = `<span class="typing"><span></span><span></span><span></span></span>`;
}

async function ask(text) {
  appendMessage("user", text);
  history.push({role: "user", content: text});

  const botBubble = appendMessage("bot", "");
  showTyping(botBubble);
  sendBtn.disabled = true;

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({model: MODEL, messages: history, stream: true}),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    // stream NDJSON from Ollama
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    let answer = "";
    let firstTokenReceived = false;

    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});

      let nl;
      while ((nl = buffer.indexOf("\n")) !== -1) {
        const line = buffer.slice(0, nl).trim();
        buffer = buffer.slice(nl + 1);
        if (!line) continue;
        let obj;
        try { obj = JSON.parse(line); } catch { continue; }
        const piece = obj?.message?.content ?? "";
        if (piece) {
          if (!firstTokenReceived) {
            botBubble.textContent = "";
            firstTokenReceived = true;
          }
          answer += piece;
          botBubble.textContent = answer;
          chat.scrollTop = chat.scrollHeight;
        }
        if (obj.done) break;
      }
    }

    if (!answer) {
      botBubble.textContent = "(no response received)";
    } else {
      history.push({role: "assistant", content: answer});
    }
  } catch (err) {
    botBubble.textContent = `⚠ couldn't reach the model: ${err.message}`;
    setStatus("err", "model unreachable");
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

// health check at boot
async function checkHealth() {
  try {
    const r = await fetch("/api/tags");
    if (!r.ok) throw new Error();
    const data = await r.json();
    const has = (data.models || []).some(m => m.name?.startsWith(MODEL));
    if (has) setStatus("ok", "model ready");
    else     setStatus("err", "model not loaded");
  } catch {
    setStatus("err", "ollama unreachable");
  }
}
checkHealth();
setInterval(checkHealth, 15000);
input.focus();
</script>
</body>
</html>
