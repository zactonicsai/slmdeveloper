# Single-origin setup: nginx serves the static UI on / and proxies /api/* to
# the Ollama daemon. This avoids CORS configuration on Ollama and lets the UI
# fetch with relative URLs.

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ---- static UI -----------------------------------------------------
    location / {
        try_files $uri $uri/ =404;
    }

    # ---- Ollama API proxy ----------------------------------------------
    # Streaming (NDJSON) is critical for /api/chat — disable buffering so
    # tokens land in the browser as they're produced.
    location /api/ {
        proxy_pass http://ollama:11434/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Connection        "";

        proxy_buffering           off;
        proxy_cache               off;
        proxy_request_buffering   off;
        proxy_read_timeout        300s;
        proxy_send_timeout        300s;
        chunked_transfer_encoding on;
    }
}
