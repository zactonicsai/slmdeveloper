version: '3.8'
services:
  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: ["./ollama:/root/.ollama"]
    command: serve
  chroma:
    image: chromadb/chroma
    ports: ["8000:8000"]
    volumes: ["./chroma:/chroma/chroma"]
  api:
    build: .
    ports: ["8000:8000"]
    depends_on: [ollama, chroma]
    environment:
      OLLAMA_HOST: http://ollama:11434
      CHROMA_HOST: http://chroma:8000